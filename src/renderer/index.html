<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>VibeTerminal</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    :root {
      --bg: #0D0D0D;
      --bg-secondary: #1A1A1A;
      --fg: #E0E0E0;
      --fg-dim: #888888;
      --cursor: #00FF88;
      --cursor-glow: rgba(0, 255, 136, 0.5);
      --selection: rgba(0, 255, 136, 0.2);
      --accent: #00FF88;
      --accent-dim: #00FF8880;
      --border: #2A2A2A;
      --tab-active: #00FF88;
      --black: #1A1A2E;
      --red: #FF6B6B;
      --green: #4ADE80;
      --yellow: #FACC15;
      --blue: #60A5FA;
      --magenta: #C084FC;
      --cyan: #22D3EE;
      --white: #E0E0E0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Title Bar */
    .titlebar {
      height: 38px;
      background: var(--bg);
      display: flex;
      align-items: center;
      -webkit-app-region: drag;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .titlebar-buttons {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 8px;
      padding-left: 12px;
    }

    .titlebar-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .titlebar-btn:hover { opacity: 0.8; }
    .titlebar-btn.close { background: var(--btn-close, #FF5F57); }
    .titlebar-btn.minimize { background: var(--btn-minimize, #FFBD2E); }
    .titlebar-btn.maximize { background: var(--btn-maximize, #28CA41); }

    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-dim);
    }

    .titlebar-right {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      padding-right: 12px;
      width: 68px;
      justify-content: flex-end;
    }

    .settings-trigger {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      cursor: pointer;
      padding: 4px 6px;
      display: flex;
      align-items: center;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .settings-trigger:hover {
      color: var(--fg);
      background: rgba(255, 255, 255, 0.07);
    }

    /* Update Banner */
    .update-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 5px 16px;
      background: rgba(0, 255, 136, 0.08);
      border-bottom: 1px solid var(--accent-dim);
      font-size: 12px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .update-banner.visible { display: flex; }

    .update-banner-btn {
      background: var(--accent);
      border: none;
      color: var(--bg);
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Tab Bar */
    .tabbar {
      height: 38px;
      background: var(--bg);
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      gap: 2px;
      flex-shrink: 0;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--fg-dim);
      font-size: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      max-width: 180px;
    }

    .tab:hover { color: var(--fg); background: rgba(255, 255, 255, 0.05); }
    .tab.active { color: var(--fg); border-bottom-color: var(--tab-active); }
    .tab-icon { font-size: 12px; color: var(--accent); }
    .tab-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; }
    .tab-close { font-size: 10px; opacity: 0; transition: opacity 0.15s; }
    .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }

    .tab-new {
      padding: 8px;
      background: transparent;
      border: none;
      color: var(--fg-dim);
      cursor: pointer;
      font-size: 14px;
    }

    .tab-new:hover { color: var(--fg); }

    /* Terminal Container */
    .terminal-container {
      flex: 1;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    .terminal-view {
      position: absolute;
      inset: 0;
      display: none;
      padding: 8px;
    }

    .terminal-view.active { display: block; }
    .terminal-wrapper { width: 100%; height: 100%; }

    .xterm { height: 100%; }

    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: var(--bg); }
    .xterm-viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }

    .xterm-cursor-block {
      background: var(--cursor) !important;
      box-shadow: 0 0 10px var(--cursor-glow), 0 0 20px var(--cursor-glow);
    }

    .xterm-cursor-bar {
      background: var(--cursor) !important;
      box-shadow: 0 0 10px var(--cursor-glow);
    }

    /* Status Bar */
    .statusbar {
      height: 24px;
      background: linear-gradient(to bottom, rgba(26, 26, 26, 0.9), rgba(13, 13, 13, 0.9));
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 11px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .statusbar-left { display: flex; align-items: center; gap: 16px; }
    .statusbar-item { display: flex; align-items: center; gap: 6px; color: var(--fg-dim); }
    .statusbar-item svg { width: 11px; height: 11px; }
    .statusbar-right { display: flex; align-items: center; gap: 16px; }
    .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

    /* Command Palette */
    .command-palette-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: flex-start;
      padding-top: 100px;
      z-index: 1000;
    }

    .command-palette-overlay.visible { display: flex; }

    .command-palette {
      width: 450px;
      background: var(--bg-secondary);
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .command-palette-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
      font-size: 14px;
      outline: none;
    }

    .command-palette-input::placeholder { color: var(--fg-dim); }

    .command-list { max-height: 300px; overflow-y: auto; }

    .command-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .command-item:hover, .command-item.selected { background: var(--selection); }
    .command-item-title { font-size: 13px; }
    .command-item-shortcut {
      font-size: 11px;
      color: var(--fg-dim);
      background: var(--bg);
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
    }

    /* Search Overlay */
    .search-overlay {
      position: fixed;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      background: var(--bg-secondary);
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      z-index: 999;
      overflow: hidden;
    }

    .search-overlay.visible { display: block; }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      background: transparent;
      border: none;
      color: var(--fg);
      font-size: 13px;
      outline: none;
      width: 250px;
    }

    .search-input::placeholder { color: var(--fg-dim); }

    .search-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg-dim);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .search-toggle.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .search-count { font-size: 11px; color: var(--fg-dim); font-family: monospace; }

    /* Split Panes */
    .split-container { display: flex; width: 100%; height: 100%; }
    .split-container.vertical { flex-direction: column; }
    .split-container.horizontal { flex-direction: row; }
    .split-pane { flex: 1; position: relative; min-width: 100px; min-height: 100px; overflow: hidden; }
    .split-pane .terminal-wrapper { position: absolute; inset: 0; width: auto; height: auto; }
    .split-divider { background: var(--border); z-index: 10; flex-shrink: 0; }
    .split-divider.horizontal { width: 4px; cursor: col-resize; }
    .split-divider.vertical { height: 4px; cursor: row-resize; }
    .split-divider:hover, .split-divider.dragging { background: var(--accent); }

    /* Workspace Bar */
    .workspacebar {
      height: 36px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      gap: 3px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .workspacebar::-webkit-scrollbar { height: 0; }

    .workspace-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--fg-dim);
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }

    .workspace-item:hover {
      color: var(--fg);
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border);
    }

    .workspace-item.active {
      color: var(--accent);
      background: rgba(0, 255, 136, 0.08);
      border-color: var(--accent-dim);
    }

    .workspace-item-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }

    .workspace-item-close {
      font-size: 9px;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1;
      padding: 1px 2px;
      border-radius: 2px;
    }

    .workspace-item:hover .workspace-item-close,
    .workspace-item.active .workspace-item-close { opacity: 0.5; }

    .workspace-item-close:hover { opacity: 1 !important; background: rgba(255,255,255,0.1); }

    .workspace-item-undock {
      font-size: 9px;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1;
      padding: 1px 2px;
      border-radius: 2px;
    }

    .workspace-item:hover .workspace-item-undock,
    .workspace-item.active .workspace-item-undock { opacity: 0.5; }

    .workspace-item-undock:hover { opacity: 1 !important; background: rgba(255,255,255,0.1); }

    .workspace-add {
      padding: 4px 7px;
      background: transparent;
      border: none;
      color: var(--fg-dim);
      cursor: pointer;
      font-size: 14px;
      border-radius: 4px;
      transition: all 0.15s;
      line-height: 1;
    }

    .workspace-add:hover { color: var(--fg); background: rgba(255,255,255,0.05); }

    .workspace-rename-input {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 11px;
      outline: none;
      max-width: 120px;
      font-family: inherit;
      padding: 0;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--fg-dim);
      gap: 16px;
    }

    .empty-state-icon { font-size: 48px; opacity: 0.5; }
    .empty-state-text { font-size: 16px; }
    .empty-state-hint { font-size: 13px; opacity: 0.7; }

    .empty-state-btn {
      margin-top: 8px;
      padding: 10px 20px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .empty-state-btn:hover { opacity: 0.9; }

    /* Settings Modal */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .settings-overlay.visible { display: flex; }

    .settings-panel {
      width: 500px;
      background: var(--bg-secondary);
      border-radius: 10px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      max-height: 85vh;
      border: 1px solid var(--border);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .settings-header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
    }

    .settings-close {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .settings-close:hover { color: var(--fg); background: rgba(255,255,255,0.06); }

    .settings-body {
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .settings-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .settings-row:last-child { margin-bottom: 0; }

    .settings-label {
      width: 130px;
      font-size: 13px;
      color: var(--fg-dim);
      flex-shrink: 0;
    }

    .settings-hint {
      font-size: 11px;
      color: var(--fg-dim);
      opacity: 0.6;
      margin-top: 4px;
      margin-left: 142px;
    }

    .settings-input, .settings-select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .settings-input:focus, .settings-select:focus { border-color: var(--accent-dim); }

    .settings-select { cursor: pointer; }

    .settings-input[type="number"] { width: 80px; flex: none; }

    .settings-checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .settings-checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .settings-checkbox-label {
      font-size: 13px;
      color: var(--fg-dim);
      cursor: pointer;
    }

    .settings-update-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 7px 14px;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .settings-update-btn:hover { border-color: var(--fg-dim); }

    .settings-update-status {
      font-size: 12px;
      color: var(--fg-dim);
      margin-left: 10px;
    }

    .settings-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    .settings-btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg-dim);
      padding: 7px 16px;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .settings-btn-cancel:hover { border-color: var(--fg-dim); color: var(--fg); }

    .settings-btn-save {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: var(--bg);
      padding: 7px 20px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .settings-btn-save:hover { opacity: 0.88; }

    /* Windows-style titlebar */
    .titlebar-win { padding-left: 0; }
    .titlebar-app-name {
      flex: 1;
      font-size: 12px;
      color: var(--fg-dim);
      font-weight: 500;
      padding-left: 10px;
      pointer-events: none;
    }
    .titlebar-win-right {
      display: flex;
      align-items: stretch;
      height: 100%;
      -webkit-app-region: no-drag;
    }
    .titlebar-btn.win {
      width: 46px;
      height: 38px;
      border-radius: 0;
      background: transparent;
      color: var(--fg-dim);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .titlebar-btn.win:hover { background: rgba(255,255,255,0.1); color: var(--fg); opacity: 1; }
    .titlebar-btn.win.close:hover { background: #e81123; color: #fff; opacity: 1; }
    .titlebar-win-right .settings-trigger { margin-right: 2px; }

    /* Linux-style titlebar */
    .titlebar-linux { padding-left: 0; }
    .titlebar-linux-right {
      display: flex;
      align-items: center;
      height: 100%;
      -webkit-app-region: no-drag;
      padding-right: 8px;
      gap: 4px;
    }
    .titlebar-btn.lnx {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: var(--fg-dim);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .titlebar-btn.lnx:hover { background: rgba(255,255,255,0.18); color: var(--fg); opacity: 1; }
    .titlebar-btn.lnx.close:hover { background: var(--btn-close, #FF5F57); color: #fff; opacity: 1; }
    .titlebar-linux-right .settings-trigger { margin-right: 4px; }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 0;
      z-index: 10000;
      min-width: 150px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      font-size: 12px;
    }

    .context-menu-item {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      color: var(--fg);
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
      user-select: none;
    }

    .context-menu-item:hover { background: rgba(255,255,255,0.08); }

    .context-menu-item.danger:hover { background: rgba(255,80,80,0.15); color: #ff6b6b; }

    .context-menu-separator { height: 1px; background: var(--border); margin: 4px 0; }

    .tab-rename-input {
      background: transparent;
      border: none;
      color: var(--fg);
      font-size: 12px;
      outline: none;
      max-width: 100px;
      font-family: inherit;
      padding: 0;
    }

    /* SSH Dropdown */
    .ssh-btn {
      padding: 6px 8px;
      background: transparent;
      border: none;
      color: var(--fg-dim);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 4px;
      transition: all 0.15s;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .ssh-btn:hover { color: var(--accent); background: rgba(0,255,136,0.07); }
    .ssh-btn.active { color: var(--accent); }

    .ssh-dropdown {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0;
      z-index: 5000;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      overflow: hidden;
    }

    .ssh-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      padding: 10px 14px 6px;
    }

    .ssh-host-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .ssh-host-item:hover { background: rgba(255,255,255,0.06); }

    .ssh-host-info { flex: 1; min-width: 0; }
    .ssh-host-name { font-size: 13px; color: var(--fg); }
    .ssh-host-detail { font-size: 11px; color: var(--fg-dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .ssh-host-connect {
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.1s;
      padding-left: 8px;
      flex-shrink: 0;
    }

    .ssh-host-item:hover .ssh-host-connect { opacity: 1; }

    .ssh-dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }

    .ssh-form-area {
      padding: 8px 14px 12px;

      background: var(--accent);
      border: none;
      color: var(--bg);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ssh-go-btn:hover { opacity: 0.88; }

    .ssh-save-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: var(--bg);
      padding: 7px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 2px;
    }

    .ssh-save-btn:hover { opacity: 0.88; }

    .ssh-empty {
      padding: 10px 14px 6px;
      font-size: 12px;
      color: var(--fg-dim);
    }

          '--fg': '#CDD6F4', '--fg-dim': '#6C7086',
          '--cursor': '#F5E0DC', '--cursor-glow': 'rgba(203, 166, 247, 0.5)',
          '--selection': 'rgba(203, 166, 247, 0.2)',
          '--accent': '#CBA6F7', '--accent-dim': '#CBA6F780',
          '--border': '#313244', '--tab-active': '#CBA6F7',
          '--btn-close': '#F38BA8', '--btn-minimize': '#F9E2AF', '--btn-maximize': '#A6E3A1',
        },
        terminal: {
          background: '#1E1E2E', foreground: '#CDD6F4',
          cursor: '#F5E0DC', cursorAccent: '#1E1E2E', selectionBackground: '#313244',
          black: '#45475A', red: '#F38BA8', green: '#A6E3A1', yellow: '#F9E2AF',
          blue: '#89B4FA', magenta: '#CBA6F7', cyan: '#89DCEB', white: '#BAC2DE',
          brightBlack: '#585B70', brightRed: '#F38BA8', brightGreen: '#A6E3A1',
          brightYellow: '#F9E2AF', brightBlue: '#89B4FA', brightMagenta: '#CBA6F7',
          brightCyan: '#89DCEB', brightWhite: '#A6ADC8',
        }
      },
    };

    const DEFAULT_SETTINGS = {
      fontFamily: '"MesloLGS NF", monospace',
      fontSize: 13,
      cursorStyle: 'block',
      cursorBlink: true,
      scrollback: 10000,
      shell: '',
      theme: 'vibe',
      titlebarStyle: 'auto'
    };

    class TerminalManager {
      constructor() {
        this.workspaces = [];
        this.activeWorkspaceId = null;
        this.terminals = new Map();
        this.settings = { ...DEFAULT_SETTINGS };
        this.searchTerm = '';
        this.platform = 'linux';
        this.lastMouseX = 0;
        this.lastMouseY = 0;

        this.commands = [
          { id: 'newTab',          title: 'New Tab',              shortcut: '⌘T',   action: () => this.addTab() },
          { id: 'closeTab',        title: 'Close Tab',            shortcut: '⌘W',   action: () => this.closeActiveTab() },
          { id: 'splitH',          title: 'Split Horizontally',   shortcut: '⌘D',   action: () => this.splitActiveTab('horizontal') },
          { id: 'splitV',          title: 'Split Vertically',     shortcut: '⌘⇧D',  action: () => this.splitActiveTab('vertical') },
          { id: 'nextTab',         title: 'Next Tab',             shortcut: '⌘⇧]',  action: () => this.nextTab() },
          { id: 'prevTab',         title: 'Previous Tab',         shortcut: '⌘⇧[',  action: () => this.prevTab() },
          { id: 'newWorkspace',    title: 'New Workspace',        shortcut: '⌘⇧N',  action: () => this.addWorkspace() },
          { id: 'nextWorkspace',   title: 'Next Workspace',       shortcut: '⌘⇧.',  action: () => this.nextWorkspace() },
          { id: 'prevWorkspace',   title: 'Previous Workspace',   shortcut: '⌘⇧,',  action: () => this.prevWorkspace() },
          { id: 'clear',           title: 'Clear Terminal',       shortcut: '⌘K',   action: () => this.clearActiveTerminal() },
          { id: 'search',          title: 'Search...',            shortcut: '⌘F',   action: () => this.showSearch() },
          { id: 'settings',        title: 'Settings',             shortcut: '⌘,',   action: () => this.showSettings() },
        ];

        this.init();
      }

      get currentWorkspace() {
        return this.workspaces.find(w => w.id === this.activeWorkspaceId) || null;
      }

      get tabs() {
        return this.currentWorkspace ? this.currentWorkspace.tabs : [];
      }

      get activeTabId() {
        return this.currentWorkspace ? this.currentWorkspace.activeTabId : null;
      }

      set activeTabId(id) {
        if (this.currentWorkspace) this.currentWorkspace.activeTabId = id;
      }

      async init() {
        try {
          this.settings = await window.terminalAPI.getSettings();
        } catch (e) {
          this.settings = { ...DEFAULT_SETTINGS };
        }
        try { this.platform = await window.terminalAPI.getPlatform(); } catch {}
        this.applyTheme(this.settings.theme || 'vibe');
        this.renderTitlebar();
        this.setupEventListeners();
        const hash = window.location.hash;
        const initialName = (hash && hash.startsWith('#ws='))
          ? decodeURIComponent(hash.slice(4))
          : 'workspace 1';
        await this.addWorkspace(initialName);
      }

      setupEventListeners() {
        window.terminalAPI.onNewTab(() => this.addTab());
        window.terminalAPI.onCloseTab(() => this.closeActiveTab());
        window.terminalAPI.onClearTerminal(() => this.clearActiveTerminal());
        window.terminalAPI.onNextTab(() => this.nextTab());
        window.terminalAPI.onPrevTab(() => this.prevTab());
        window.terminalAPI.onSplitHorizontal(() => this.splitActiveTab('horizontal'));
        window.terminalAPI.onSplitVertical(() => this.splitActiveTab('vertical'));
        window.terminalAPI.onShowSearch(() => this.showSearch());
        window.terminalAPI.onShowCommandPalette(() => this.showCommandPalette());
        window.terminalAPI.onShowSettings(() => this.showSettings());

        window.terminalAPI.onData(({ id, data }) => {
          const term = this.terminals.get(id);
          if (term) term.terminal.write(data);
        });

        window.terminalAPI.onExit(({ id }) => {
          this.terminals.delete(id);
          for (const ws of this.workspaces) {
            const tab = ws.tabs.find(t => t.terminals.some(tn => tn.id === id));
            if (tab) {
              tab.terminals = tab.terminals.filter(tn => tn.id !== id);
              if (tab.terminals.length === 0) {
                if (ws.id === this.activeWorkspaceId) {
                  this.closeTab(tab.id);
                } else {
                  ws.tabs = ws.tabs.filter(t => t.id !== tab.id);
                }
              }
              break;
            }
          }
        });

        window.terminalAPI.onUpdateAvailable(({ version }) => {
          const banner = document.getElementById('updateBanner');
          banner.innerHTML = `<span>Version ${version} is downloading in the background...</span>`;
          banner.classList.add('visible');
        });

        window.terminalAPI.onUpdateDownloaded(({ version }) => {
          const banner = document.getElementById('updateBanner');
          banner.innerHTML = `
            <span>Version ${version} is ready to install.</span>
            <button class="update-banner-btn" onclick="terminalManager.installUpdate()">Restart & Update</button>
          `;
          banner.classList.add('visible');
        });

        window.terminalAPI.onUpdateStatus(({ message }) => {
          document.getElementById('updateStatus').textContent = message;
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') this.hideOverlays();
        });

        // Capture-phase handler so shortcuts fire even when xterm has keyboard focus.
        // On Linux/Wayland, Electron menu accelerators don't reliably reach the renderer
        // when a canvas-based element (xterm) has focus, so we intercept here instead.
        document.addEventListener('keydown', (e) => {
          const mod = e.ctrlKey || e.metaKey;
          if (!mod) return;
          // Ctrl+Shift+D → vertical split. Captured before xterm so it doesn't reach the PTY.
          // Ctrl+D (no shift) is intentionally left alone — it sends EOF to the shell.
          if (e.shiftKey && e.code === 'KeyD') {
            e.preventDefault();
            e.stopPropagation();
            this.splitActiveTab('vertical');
          }
        }, true); // capture phase — fires before xterm's canvas event listeners

        // Track mouse position so contextmenu handler has valid coords on Linux
        document.addEventListener('mousemove', (e) => { this.lastMouseX = e.clientX; this.lastMouseY = e.clientY; }, true);
        document.addEventListener('mousedown', (e) => { this.lastMouseX = e.clientX; this.lastMouseY = e.clientY; }, true);
      }

      // ─── Workspace management ────────────────────────────────────────────────

      async addWorkspace(name) {
        const id = Date.now().toString();
        const num = this.workspaces.length + 1;
        const workspace = { id, name: name || `workspace ${num}`, tabs: [], activeTabId: null };
        this.workspaces.push(workspace);
        this.activeWorkspaceId = id;
        this.renderWorkspaces();
        this.renderTabs();
        await this.addTab();
      }

      closeWorkspace(id) {
        if (this.workspaces.length === 1) return;

        const ws = this.workspaces.find(w => w.id === id);
        if (!ws) return;

        ws.tabs.forEach(tab => {
          tab.terminals.forEach(t => {
            window.terminalAPI.kill(t.id);
            this.terminals.delete(t.id);
          });
          if (tab.container) tab.container.remove();
        });

        const index = this.workspaces.findIndex(w => w.id === id);
        this.workspaces.splice(index, 1);

        if (this.activeWorkspaceId === id) {
          const next = this.workspaces[Math.min(index, this.workspaces.length - 1)];
          this.setActiveWorkspace(next.id);
        } else {
          this.renderWorkspaces();
        }
      }

      setActiveWorkspace(id) {
        this.activeWorkspaceId = id;
        const ws = this.workspaces.find(w => w.id === id);

        if (ws) {
          const tabId = ws.activeTabId || (ws.tabs.length > 0 ? ws.tabs[0].id : null);
          if (tabId) {
            this.setActiveTab(tabId);
          } else {
            document.querySelectorAll('.terminal-view').forEach(v => v.classList.remove('active'));
            this.renderTabs();
          }
        }

        this.renderWorkspaces();
      }

      nextWorkspace() {
        const index = this.workspaces.findIndex(w => w.id === this.activeWorkspaceId);
        this.setActiveWorkspace(this.workspaces[(index + 1) % this.workspaces.length].id);
      }

      prevWorkspace() {
        const index = this.workspaces.findIndex(w => w.id === this.activeWorkspaceId);
        this.setActiveWorkspace(this.workspaces[(index - 1 + this.workspaces.length) % this.workspaces.length].id);
      }

      async undockWorkspace(wsId) {
        const ws = this.workspaces.find(w => w.id === wsId);
        if (!ws) return;
        await window.terminalAPI.openNewWindow(ws.name);
        if (this.workspaces.length > 1) {
          this.closeWorkspace(wsId);
        }
      }

      startWorkspaceRename(id, nameEl) {
        const ws = this.workspaces.find(w => w.id === id);
        if (!ws) return;

        const input = document.createElement('input');
        input.value = ws.name;
        input.className = 'workspace-rename-input';

        const finish = () => {
          ws.name = input.value.trim() || ws.name;
          this.renderWorkspaces();
        };

        input.onblur = finish;
        input.onkeydown = (e) => {
          if (e.key === 'Enter') input.blur();
          if (e.key === 'Escape') { input.value = ws.name; input.blur(); }
          e.stopPropagation();
        };

        nameEl.replaceWith(input);
        requestAnimationFrame(() => { input.focus(); input.select(); });
      }

      showContextMenu(x, y, items) {
        // On Linux/Wayland, contextmenu events sometimes report (0,0) — fall back to last known position
        if (x === 0 && y === 0) { x = this.lastMouseX; y = this.lastMouseY; }
        const existing = document.getElementById('contextMenu');
        if (existing) existing.remove();

        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.id = 'contextMenu';

        items.forEach(item => {
          if (item === 'separator') {
            const sep = document.createElement('div');
            sep.className = 'context-menu-separator';
            menu.appendChild(sep);
          } else {
            const el = document.createElement('div');
            el.className = `context-menu-item${item.danger ? ' danger' : ''}`;
            el.textContent = item.label;
            el.onclick = () => { menu.remove(); item.action(); };
            menu.appendChild(el);
          }
        });

        document.body.appendChild(menu);

        const vw = window.innerWidth, vh = window.innerHeight;
        const mw = menu.offsetWidth, mh = menu.offsetHeight;
        menu.style.left = (x + mw > vw ? vw - mw - 8 : x) + 'px';
        menu.style.top = (y + mh > vh ? vh - mh - 8 : y) + 'px';

        const dismiss = (e) => {
          if (!menu.contains(e.target)) {
            menu.remove();
            document.removeEventListener('mousedown', dismiss);
          }
        };
        setTimeout(() => document.addEventListener('mousedown', dismiss), 0);
      }

      startTabRename(tabId, titleEl) {
        const tab = this.tabs.find(t => t.id === tabId);
        if (!tab) return;

        const input = document.createElement('input');
        input.value = tab.title;
        input.className = 'tab-rename-input';

        const finish = () => {
          tab.title = input.value.trim() || tab.title;
          this.renderTabs();
        };

        input.onblur = finish;
        input.onkeydown = (e) => {
          if (e.key === 'Enter') input.blur();
          if (e.key === 'Escape') { input.value = tab.title; input.blur(); }
          e.stopPropagation();
        };

        titleEl.replaceWith(input);
        requestAnimationFrame(() => { input.focus(); input.select(); });
      }

      renderWorkspaces() {
        const bar = document.getElementById('workspacebar');
        bar.innerHTML = '';

        this.workspaces.forEach(ws => {
          const el = document.createElement('div');
          el.className = `workspace-item ${ws.id === this.activeWorkspaceId ? 'active' : ''}`;

          const nameEl = document.createElement('span');
          nameEl.className = 'workspace-item-name';
          nameEl.textContent = ws.name;
          nameEl.ondblclick = (e) => {
            e.stopPropagation();
            this.startWorkspaceRename(ws.id, nameEl);
          };

          const undockEl = document.createElement('span');
          undockEl.className = 'workspace-item-undock';
          undockEl.textContent = '↗';
          undockEl.title = 'Undock to new window';
          undockEl.onclick = (e) => {
            e.stopPropagation();
            this.undockWorkspace(ws.id);
          };

          const closeEl = document.createElement('span');
          closeEl.className = 'workspace-item-close';
          closeEl.textContent = '✕';
          closeEl.onclick = (e) => {
            e.stopPropagation();
            this.closeWorkspace(ws.id);
          };

          el.appendChild(nameEl);
          el.appendChild(undockEl);
          if (this.workspaces.length > 1) el.appendChild(closeEl);
          el.onclick = () => { if (ws.id !== this.activeWorkspaceId) this.setActiveWorkspace(ws.id); };
          el.oncontextmenu = (e) => {
            e.preventDefault();
            e.stopPropagation();
            this.setActiveWorkspace(ws.id);
            const menuItems = [
              { label: 'Rename', action: () => {
                const n = document.querySelector('.workspace-item.active .workspace-item-name');
                if (n) this.startWorkspaceRename(ws.id, n);
              }},
              { label: 'Undock to New Window', action: () => this.undockWorkspace(ws.id) },
              'separator',
              { label: 'New Workspace', action: () => this.addWorkspace() },
            ];
            if (this.workspaces.length > 1) {
              menuItems.push({ label: 'Close Workspace', danger: true, action: () => this.closeWorkspace(ws.id) });
            }
            this.showContextMenu(e.clientX, e.clientY, menuItems);
          };
          bar.appendChild(el);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'workspace-add';
        addBtn.textContent = '+';
        addBtn.title = 'New Workspace';
        addBtn.onclick = () => this.addWorkspace();
        bar.appendChild(addBtn);
      }

      // ─── Tab management ──────────────────────────────────────────────────────

      async addTab() {
        if (!this.currentWorkspace) return;

        const id = Date.now().toString();
        const shellPath = await window.terminalAPI.getShellPath();
        const shell = shellPath.split('/').pop();

        const tab = { id, title: shell, terminals: [], activeTerminalIndex: 0, container: null, splitDirection: null };
        this.currentWorkspace.tabs.push(tab);
        await this.createTerminalForTab(tab);
        this.setActiveTab(id);
        this.renderTabs();
      }

      async createTerminalForTab(tab) {
        if (!tab.container) {
          const container = document.createElement('div');
          container.className = 'terminal-view';
          container.dataset.tabId = tab.id;
          document.getElementById('terminalContainer').appendChild(container);
          tab.container = container;
        }

        const wrapper = document.createElement('div');
        wrapper.className = 'terminal-wrapper';
        tab.container.appendChild(wrapper);

        await this._spawnTerminalInWrapper(tab, wrapper);
      }

      async _spawnTerminalInWrapper(tab, wrapper) {
        const result = await window.terminalAPI.createTerminal({ cols: 80, rows: 24 });
        if (!result.success) return;

        const s = this.settings;
        const terminal = new Terminal({
          theme: this.getXtermTheme(),
          fontFamily: s.fontFamily,
          fontSize: s.fontSize,
          cursorBlink: s.cursorBlink,
          cursorStyle: s.cursorStyle,
          scrollback: s.scrollback,
          allowProposedApi: true
        });

        const fitAddon = new FitAddon.FitAddon();
        const searchAddon = new SearchAddon.SearchAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();

        terminal.loadAddon(fitAddon);
        terminal.loadAddon(searchAddon);
        terminal.loadAddon(webLinksAddon);
        terminal.open(wrapper);
        fitAddon.fit();

        // Copy: Ctrl+Shift+C  |  Paste: Ctrl+Shift+V or Ctrl+V
        terminal.attachCustomKeyEventHandler((e) => {
          if (e.type !== 'keydown') return true;
          const mod = e.ctrlKey || e.metaKey;
          if (mod && e.shiftKey && e.key === 'C') {
            const sel = terminal.getSelection();
            if (sel) navigator.clipboard.writeText(sel).catch(() => {});
            return false;
          }
          if (mod && (e.key === 'v' || (e.shiftKey && e.key === 'V'))) {
            navigator.clipboard.readText().then(text => {
              if (text) terminal.paste(text);
            }).catch(() => {});
            return false;
          }
          return true;
        });

        // Right-click pastes from clipboard
        wrapper.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const sel = terminal.getSelection();
          if (sel) {
            navigator.clipboard.writeText(sel).catch(() => {});
          } else {
            navigator.clipboard.readText().then(text => {
              if (text) terminal.paste(text);
            }).catch(() => {});
          }
        });

        const terminalData = { id: result.id, terminal, fitAddon, searchAddon, wrapper };
        this.terminals.set(result.id, terminalData);
        tab.terminals.push(terminalData);
        tab.activeTerminalIndex = tab.terminals.length - 1;

        terminal.onData((data) => window.terminalAPI.write(result.id, data));
        terminal.onResize(({ cols, rows }) => {
          window.terminalAPI.resize(result.id, cols, rows);
          document.getElementById('dimensions').textContent = `${cols}x${rows}`;
        });

        wrapper.addEventListener('mousedown', () => {
          tab.activeTerminalIndex = tab.terminals.indexOf(terminalData);
          terminal.focus();
        });

        window.addEventListener('resize', () => fitAddon.fit());
        terminal.focus();
      }

      closeTab(tabId) {
        const ws = this.currentWorkspace;
        if (!ws) return;

        const index = ws.tabs.findIndex(t => t.id === tabId);
        if (index === -1) return;

        const tab = ws.tabs[index];
        tab.terminals.forEach(t => {
          window.terminalAPI.kill(t.id);
          this.terminals.delete(t.id);
        });
        if (tab.container) tab.container.remove();

        ws.tabs.splice(index, 1);

        if (ws.tabs.length === 0) {
          this.addTab();
        } else if (ws.activeTabId === tabId) {
          this.setActiveTab(ws.tabs[Math.min(index, ws.tabs.length - 1)].id);
        }

        this.renderTabs();
      }

      closeActiveTab() { if (this.activeTabId) this.closeTab(this.activeTabId); }

      setActiveTab(tabId) {
        if (this.currentWorkspace) this.currentWorkspace.activeTabId = tabId;
        document.querySelectorAll('.terminal-view').forEach(v => v.classList.remove('active'));
        const tab = this.tabs.find(t => t.id === tabId);
        if (tab && tab.container) {
          tab.container.classList.add('active');
          tab.terminals.forEach(t => t.fitAddon.fit());
          const active = tab.terminals[tab.activeTerminalIndex];
          if (active) active.terminal.focus();
        }
        this.renderTabs();
      }

      nextTab() {
        if (!this.tabs.length) return;
        const index = this.tabs.findIndex(t => t.id === this.activeTabId);
        this.setActiveTab(this.tabs[(index + 1) % this.tabs.length].id);
      }

      prevTab() {
        if (!this.tabs.length) return;
        const index = this.tabs.findIndex(t => t.id === this.activeTabId);
        this.setActiveTab(this.tabs[(index - 1 + this.tabs.length) % this.tabs.length].id);
      }

      async splitActiveTab(direction) {
        const tab = this.tabs.find(t => t.id === this.activeTabId);
        if (!tab || tab.terminals.length === 0 || tab.splitDirection) return;

        tab.splitDirection = direction;
        const tabRoot = tab.container;

        // Pull the existing terminal wrapper out of the tab root
        const existingTermData = tab.terminals[0];
        const existingWrapper = existingTermData.wrapper;
        existingWrapper.remove();

        // Build the split layout
        const splitContainer = document.createElement('div');
        splitContainer.className = `split-container ${direction}`;

        const pane1 = document.createElement('div');
        pane1.className = 'split-pane';
        pane1.appendChild(existingWrapper);

        const divider = document.createElement('div');
        divider.className = `split-divider ${direction}`;

        const pane2 = document.createElement('div');
        pane2.className = 'split-pane';

        splitContainer.appendChild(pane1);
        splitContainer.appendChild(divider);
        splitContainer.appendChild(pane2);
        tabRoot.appendChild(splitContainer);

        this._setupDividerDrag(divider, pane1, pane2, direction, tab);

        // Re-fit the existing terminal now that it's in a pane
        setTimeout(() => existingTermData.fitAddon.fit(), 50);

        // Spawn a new terminal in pane2
        const wrapper2 = document.createElement('div');
        wrapper2.className = 'terminal-wrapper';
        pane2.appendChild(wrapper2);
        await this._spawnTerminalInWrapper(tab, wrapper2);
      }

      _setupDividerDrag(divider, pane1, pane2, direction, tab) {
        const isHorizontal = direction === 'horizontal';

        divider.addEventListener('mousedown', (e) => {
          e.preventDefault();
          divider.classList.add('dragging');

          const container = pane1.parentElement;
          const containerRect = container.getBoundingClientRect();
          const startPos = isHorizontal ? e.clientX : e.clientY;
          const startSize1 = isHorizontal ? pane1.offsetWidth : pane1.offsetHeight;
          const totalSize = isHorizontal ? containerRect.width : containerRect.height;
          const dividerSize = isHorizontal ? divider.offsetWidth : divider.offsetHeight;

          const onMove = (me) => {
            const delta = (isHorizontal ? me.clientX : me.clientY) - startPos;
            const newSize1 = Math.max(100, Math.min(totalSize - dividerSize - 100, startSize1 + delta));
            const newSize2 = totalSize - dividerSize - newSize1;
            pane1.style.flex = 'none';
            pane2.style.flex = 'none';
            if (isHorizontal) {
              pane1.style.width = `${newSize1}px`;
              pane2.style.width = `${newSize2}px`;
            } else {
              pane1.style.height = `${newSize1}px`;
              pane2.style.height = `${newSize2}px`;
            }
            tab.terminals.forEach(t => t.fitAddon.fit());
          };

          const onUp = () => {
            divider.classList.remove('dragging');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            tab.terminals.forEach(t => t.fitAddon.fit());
          };

          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }

      clearActiveTerminal() {
        const tab = this.tabs.find(t => t.id === this.activeTabId);
        if (tab && tab.terminals[tab.activeTerminalIndex]) {
          const term = tab.terminals[tab.activeTerminalIndex].terminal;
          term.clear();
          term.write('\x1b[2J\x1b[H');
        }
      }

      renderTabs() {
        const tabbar = document.getElementById('tabbar');
        tabbar.innerHTML = '';

        this.tabs.forEach(tab => {
          const tabEl = document.createElement('button');
          tabEl.className = `tab ${tab.id === this.activeTabId ? 'active' : ''}`;

          const iconEl = document.createElement('span');
          iconEl.className = 'tab-icon';
          iconEl.textContent = '⌘';

          const titleEl = document.createElement('span');
          titleEl.className = 'tab-title';
          titleEl.textContent = tab.title;

          const closeEl = document.createElement('span');
          closeEl.className = 'tab-close';
          closeEl.textContent = '✕';

          tabEl.appendChild(iconEl);
          tabEl.appendChild(titleEl);
          tabEl.appendChild(closeEl);

          tabEl.onclick = (e) => {
            if (e.target.classList.contains('tab-close')) {
              this.closeTab(tab.id);
            } else if (tab.id !== this.activeTabId) {
              this.setActiveTab(tab.id);
            }
          };
          tabEl.oncontextmenu = (e) => {
            e.preventDefault();
            e.stopPropagation();
            this.setActiveTab(tab.id);
            this.showContextMenu(e.clientX, e.clientY, [
              { label: 'Rename', action: () => {
                const t = document.querySelector('.tab.active .tab-title');
                if (t) this.startTabRename(tab.id, t);
              }},
              'separator',
              { label: 'Close Tab', danger: true, action: () => this.closeTab(tab.id) },
            ]);
          };
          tabbar.appendChild(tabEl);
        });

        const newTabBtn = document.createElement('button');
        newTabBtn.className = 'tab-new';
        newTabBtn.innerHTML = '+';
        newTabBtn.onclick = () => this.addTab();
        tabbar.appendChild(newTabBtn);

        const sshBtn = document.createElement('button');
        sshBtn.className = 'ssh-btn';
        sshBtn.id = 'sshMenuBtn';
        sshBtn.innerHTML = '⌁ SSH';
        sshBtn.title = 'SSH Connections';
        sshBtn.onclick = () => this.toggleSshDropdown(sshBtn);
        tabbar.appendChild(sshBtn);
      }

      // ─── SSH Manager ─────────────────────────────────────────────────────────

      async toggleSshDropdown(btn) {
        const existing = document.getElementById('sshDropdown');
        if (existing) { existing.remove(); btn.classList.remove('active'); return; }

        btn.classList.add('active');
        const hosts = await this.loadSshHosts();
        const dropdown = document.createElement('div');
        dropdown.className = 'ssh-dropdown';
        dropdown.id = 'sshDropdown';

        let html = '';

        if (hosts.length > 0) {
          html += `<div class="ssh-section-label">Saved Hosts</div>`;
          hosts.forEach((h, i) => {
            const parts = [];
            if (h.user) parts.push(h.user + '@');
            parts.push(h.hostname || h.host);
            if (h.port && h.port !== '22') parts.push(':' + h.port);
            const detail = parts.join('');
            html += `
              <div class="ssh-host-item" data-index="${i}">
                <div class="ssh-host-info">
                  <div class="ssh-host-name">${this._escHtml(h.host)}</div>
                  <div class="ssh-host-detail">${this._escHtml(detail)}</div>
                </div>
                <span class="ssh-host-connect">Connect →</span>
              </div>`;
          });
          html += `<div class="ssh-dropdown-sep"></div>`;
        } else {
          html += `<div class="ssh-empty">No hosts in ~/.ssh/config</div>`;
          html += `<div class="ssh-dropdown-sep"></div>`;
        }

        html += `
          <div class="ssh-form-area">
            <div class="ssh-form-label">Quick Connect</div>
            <div class="ssh-quick-row">
              <input class="ssh-input ssh-input-half" id="sshQuickInput" placeholder="user@hostname">
              <button class="ssh-go-btn" id="sshQuickBtn">Connect</button>
            </div>
          </div>
          <div class="ssh-dropdown-sep"></div>
          <div class="ssh-form-area">
            <div class="ssh-form-label">Add to ~/.ssh/config</div>
            <input class="ssh-input ssh-input-full" id="sshAlias" placeholder="Alias (e.g. myserver)">
            <input class="ssh-input ssh-input-full" id="sshHostname" placeholder="Hostname or IP">
            <div class="ssh-row">
              <input class="ssh-input ssh-input-half" id="sshUser" placeholder="Username">
              <input class="ssh-input ssh-input-half" id="sshPort" placeholder="Port (22)">
            </div>
            <button class="ssh-save-btn" id="sshSaveBtn">Save &amp; Connect</button>
          </div>`;

        dropdown.innerHTML = html;

        hosts.forEach((h, i) => {
          const item = dropdown.querySelector(`[data-index="${i}"]`);
          if (item) item.onclick = () => { dropdown.remove(); btn.classList.remove('active'); this.connectSshHost(h); };
        });

        dropdown.querySelector('#sshQuickBtn').onclick = () => {
          const val = dropdown.querySelector('#sshQuickInput').value.trim();
          if (!val) { dropdown.querySelector('#sshQuickInput').classList.add('error'); setTimeout(() => dropdown.querySelector('#sshQuickInput')?.classList.remove('error'), 1500); return; }
          dropdown.remove(); btn.classList.remove('active');
          this.openSshTab(val.includes(' ') ? val : `ssh ${val}`, val);
        };

        dropdown.querySelector('#sshQuickInput').onkeydown = (e) => {
          if (e.key === 'Enter') dropdown.querySelector('#sshQuickBtn').click();
          e.stopPropagation();
        };

        dropdown.querySelector('#sshSaveBtn').onclick = () => this.saveAndConnectSsh(dropdown, btn);

        ['#sshAlias', '#sshHostname', '#sshUser', '#sshPort'].forEach(sel => {
          dropdown.querySelector(sel).onkeydown = (e) => {
            if (e.key === 'Enter') dropdown.querySelector('#sshSaveBtn').click();
            e.stopPropagation();
          };
        });

        document.body.appendChild(dropdown);

        const rect = btn.getBoundingClientRect();
        const dw = dropdown.offsetWidth;
        const vw = window.innerWidth;
        const left = Math.min(rect.right - dw, vw - dw - 8);
        dropdown.style.left = Math.max(8, left) + 'px';
        dropdown.style.top = (rect.bottom + 4) + 'px';

        const dismiss = (e) => {
          if (!dropdown.contains(e.target) && e.target !== btn) {
            dropdown.remove();
            btn.classList.remove('active');
            document.removeEventListener('mousedown', dismiss);
          }
        };
        setTimeout(() => document.addEventListener('mousedown', dismiss), 0);
      }

      _escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      async loadSshHosts() {
        try {
          const result = await window.terminalAPI.readSshConfig();
          return result.hosts || [];
        } catch { return []; }
      }

      connectSshHost(host) {
        this.openSshTab(`ssh ${host.host}`, host.host);
      }

      async saveAndConnectSsh(dropdown, btn) {
        const alias = dropdown.querySelector('#sshAlias').value.trim();
        const hostname = dropdown.querySelector('#sshHostname').value.trim();
        const user = dropdown.querySelector('#sshUser').value.trim();
        const port = dropdown.querySelector('#sshPort').value.trim() || '22';

        const markError = (sel) => {
          const el = dropdown.querySelector(sel);
          el.classList.add('error');
          el.focus();
          setTimeout(() => el?.classList.remove('error'), 1500);
        };

        if (!alias) { markError('#sshAlias'); return; }
        if (!hostname) { markError('#sshHostname'); return; }

        const result = await window.terminalAPI.writeSshConfig({ alias, hostname, user, port });
        if (result.success) {
          dropdown.remove();
          btn.classList.remove('active');
          this.openSshTab(`ssh ${alias}`, alias);
        }
      }

      async openSshTab(cmd, title) {
        if (!this.currentWorkspace) return;
        const id = Date.now().toString();
        const tab = { id, title: title || 'ssh', terminals: [], activeTerminalIndex: 0, container: null, splitDirection: null };
        this.currentWorkspace.tabs.push(tab);
        await this.createTerminalForTab(tab);
        this.setActiveTab(id);
        this.renderTabs();
        await new Promise(r => setTimeout(r, 120));
        const t = tab.terminals[0];
        if (t) window.terminalAPI.write(t.id, cmd + '\n');
      }

      showCommandPalette() {
        const overlay = document.getElementById('commandPalette');
        const input = document.getElementById('commandInput');
        overlay.classList.add('visible');
        input.value = '';
        input.focus();
        this.renderCommands('');
        input.oninput = () => this.renderCommands(input.value);
      }

      renderCommands(filter) {
        const list = document.getElementById('commandList');
        const filtered = this.commands.filter(c =>
          c.title.toLowerCase().includes(filter.toLowerCase())
        );

        list.innerHTML = filtered.map(cmd => `
          <div class="command-item" onclick="terminalManager.executeCommand('${cmd.id}')">
            <span class="command-item-title">${cmd.title}</span>
            <span class="command-item-shortcut">${cmd.shortcut}</span>
          </div>
        `).join('');
      }

      executeCommand(id) {
        const cmd = this.commands.find(c => c.id === id);
        if (cmd) { cmd.action(); this.hideOverlays(); }
      }

      showSearch() {
        document.getElementById('searchOverlay').classList.add('visible');
        document.getElementById('searchInput').focus();
      }

      hideOverlays() {
        document.getElementById('commandPalette').classList.remove('visible');
        document.getElementById('searchOverlay').classList.remove('visible');
        document.getElementById('settingsOverlay').classList.remove('visible');
        document.getElementById('sshDropdown')?.remove();
      }

      showSettings() {
        const s = this.settings;

        document.getElementById('settingsTheme').value = s.theme || 'vibe';
        document.getElementById('settingsTitlebarStyle').value = s.titlebarStyle || 'auto';

        const presetSelect = document.getElementById('settingsFontPreset');
        const isPreset = FONT_PRESETS.includes(s.fontFamily);
        if (isPreset) {
          presetSelect.value = s.fontFamily;
          document.getElementById('customFontRow').style.display = 'none';
        } else {
          presetSelect.value = 'custom';
          document.getElementById('settingsCustomFont').value = s.fontFamily;
          document.getElementById('customFontRow').style.display = 'flex';
        }

        document.getElementById('settingsFontSize').value = s.fontSize;
        document.getElementById('settingsCursorStyle').value = s.cursorStyle;
        document.getElementById('settingsCursorBlink').checked = s.cursorBlink;
        document.getElementById('settingsScrollback').value = s.scrollback;
        document.getElementById('settingsShell').value = s.shell || '';
        document.getElementById('updateStatus').textContent = '';

        document.getElementById('settingsOverlay').classList.add('visible');
      }

      onFontPresetChange() {
        const val = document.getElementById('settingsFontPreset').value;
        document.getElementById('customFontRow').style.display = val === 'custom' ? 'flex' : 'none';
      }

      async saveSettings() {
        const presetVal = document.getElementById('settingsFontPreset').value;
        const fontFamily = presetVal === 'custom'
          ? document.getElementById('settingsCustomFont').value.trim()
          : presetVal;

        const newSettings = {
          fontFamily: fontFamily || DEFAULT_SETTINGS.fontFamily,
          fontSize: parseInt(document.getElementById('settingsFontSize').value, 10) || 13,
          cursorStyle: document.getElementById('settingsCursorStyle').value,
          cursorBlink: document.getElementById('settingsCursorBlink').checked,
          scrollback: parseInt(document.getElementById('settingsScrollback').value, 10) || 10000,
          shell: document.getElementById('settingsShell').value.trim(),
          theme: document.getElementById('settingsTheme').value,
          titlebarStyle: document.getElementById('settingsTitlebarStyle').value,
        };

        const result = await window.terminalAPI.saveSettings(newSettings);
        if (result.success) {
          this.settings = newSettings;
          this.applySettingsToAllTerminals();
          this.hideSettings();
        }
      }

      hideSettings() {
        const key = this.settings.theme || 'vibe';
        this.applyTheme(key);
        const xtermTheme = (THEMES[key] || THEMES.vibe).terminal;
        this.terminals.forEach(({ terminal, fitAddon }) => {
          this._applyXtermTheme(terminal, xtermTheme, fitAddon);
        });
        document.getElementById('settingsOverlay').classList.remove('visible');
      }

      applySettingsToAllTerminals() {
        const s = this.settings;
        this.applyTheme(s.theme || 'vibe');
        this.renderTitlebar();
        const xtermTheme = this.getXtermTheme();
        this.terminals.forEach(({ terminal, fitAddon }) => {
          terminal.options.fontFamily = s.fontFamily;
          terminal.options.fontSize = s.fontSize;
          terminal.options.cursorStyle = s.cursorStyle;
          terminal.options.cursorBlink = s.cursorBlink;
          terminal.options.scrollback = s.scrollback;
          this._applyXtermTheme(terminal, xtermTheme, fitAddon);
        });
      }

      _applyXtermTheme(terminal, xtermTheme, fitAddon) {
        terminal.options.theme = xtermTheme;
        // Force xterm canvas to repaint by triggering a resize cycle
        const { cols, rows } = terminal;
        terminal.resize(Math.max(cols - 1, 1), rows);
        if (fitAddon) {
          fitAddon.fit();
        } else {
          terminal.resize(cols, rows);
        }
      }

      getXtermTheme() {
        const key = (this.settings.theme || 'vibe');
        return (THEMES[key] || THEMES.vibe).terminal;
      }

      applyTheme(key) {
        const theme = THEMES[key] || THEMES.vibe;
        const root = document.documentElement;
        Object.entries(theme.vars).forEach(([k, v]) => root.style.setProperty(k, v));
      }

      onThemePreviewChange() {
        const key = document.getElementById('settingsTheme').value;
        this.applyTheme(key);
        const xtermTheme = (THEMES[key] || THEMES.vibe).terminal;
        this.terminals.forEach(({ terminal, fitAddon }) => {
          this._applyXtermTheme(terminal, xtermTheme, fitAddon);
        });
      }

      // ─── Titlebar rendering ──────────────────────────────────────────────────

      renderTitlebar() {
        const style = this.settings.titlebarStyle || 'auto';
        const isWin = style === 'windows' || (style === 'auto' && this.platform === 'win32');
        const isLinux = style === 'linux' || (style === 'auto' && this.platform === 'linux');
        const titlebar = document.getElementById('titlebar');

        const settingsIconSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>`;

        if (isWin) {
          titlebar.className = 'titlebar titlebar-win';
          titlebar.innerHTML = `
            <div class="titlebar-app-name">VibeTerminal</div>
            <div class="titlebar-win-right">
              <button class="settings-trigger" id="settingsBtn" title="Settings (Ctrl+,)">${settingsIconSvg}</button>
              <button class="titlebar-btn win minimize" id="tbMin" title="Minimize">&#8211;</button>
              <button class="titlebar-btn win maximize" id="tbMax" title="Maximize">&#9633;</button>
              <button class="titlebar-btn win close" id="tbClose" title="Close">&#10005;</button>
            </div>
          `;
        } else if (isLinux) {
          titlebar.className = 'titlebar titlebar-linux';
          titlebar.innerHTML = `
            <div class="titlebar-app-name">VibeTerminal</div>
            <div class="titlebar-linux-right">
              <button class="settings-trigger" id="settingsBtn" title="Settings (Ctrl+,)">${settingsIconSvg}</button>
              <button class="titlebar-btn lnx minimize" id="tbMin" title="Minimize">&#8211;</button>
              <button class="titlebar-btn lnx maximize" id="tbMax" title="Maximize">&#9633;</button>
              <button class="titlebar-btn lnx close" id="tbClose" title="Close">&#10005;</button>
            </div>
          `;
        } else {
          titlebar.className = 'titlebar';
          titlebar.innerHTML = `
            <div class="titlebar-buttons">
              <button class="titlebar-btn close" id="tbClose"></button>
              <button class="titlebar-btn minimize" id="tbMin"></button>
              <button class="titlebar-btn maximize" id="tbMax"></button>
            </div>
            <div class="titlebar-title">VibeTerminal</div>
            <div class="titlebar-right">
              <button class="settings-trigger" id="settingsBtn" title="Settings (⌘,)">${settingsIconSvg}</button>
            </div>
          `;
        }

        document.getElementById('settingsBtn').onclick = () => this.showSettings();
        document.getElementById('tbMin').onclick = () => window.terminalAPI.minimize();
        document.getElementById('tbMax').onclick = () => window.terminalAPI.maximize();
        document.getElementById('tbClose').onclick = () => window.terminalAPI.close();
      }

      checkForUpdates() {
        document.getElementById('updateStatus').textContent = 'Checking...';
        window.terminalAPI.checkForUpdates();
      }

      installUpdate() {
        window.terminalAPI.installUpdate();
      }

      hasSelection() { return window.getSelection().toString().length > 0; }
    }

    const terminalManager = new TerminalManager();
  </script>
</body>
</html>
