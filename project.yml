name: VibeTerminal
options:
  bundleIdPrefix: com.vibeterminal
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  VibeTerminal:
    type: application
    platform: macOS
    sources:
      - path: App
        type: group
      - path: Views
        type: group
      - path: Terminal
        type: group
      - path: Models
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibeterminal.app
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: VibeTerminal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: Resources/VibeTerminal.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: VibeTerminal
        CFBundleDisplayName: VibeTerminal
        CFBundleIdentifier: com.vibeterminal.app
        CFBundleVersion: "66"
        CFBundleShortVersionString: "3.0.30"
        CFBundlePackageType: APPL
        CFBundleExecutable: VibeTerminal
        LSMinimumSystemVersion: "13.0"
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2024 VibeTerminal. All rights reserved."
    entitlements:
      path: Resources/VibeTerminal.entitlements
      properties:
        com.apple.security.app-sandbox: false