name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:mac -- --publish never
      - name: Build PKG installers
        run: |
          VERSION=$(node -p "require('./package.json').version")
          chmod +x build/pkg-scripts/postinstall
          mkdir -p pkg-tmp-x64
          unzip -q "dist/VibeTerminal-${VERSION}-mac.zip" -d pkg-tmp-x64
          pkgbuild \
            --component "pkg-tmp-x64/VibeTerminal.app" \
            --install-location /Applications \
            --scripts build/pkg-scripts \
            --identifier com.vibeterminal.app \
            --version "${VERSION}" \
            "dist/VibeTerminal-${VERSION}.pkg"
          rm -rf pkg-tmp-x64
          mkdir -p pkg-tmp-arm64
          unzip -q "dist/VibeTerminal-${VERSION}-arm64-mac.zip" -d pkg-tmp-arm64
          pkgbuild \
            --component "pkg-tmp-arm64/VibeTerminal.app" \
            --install-location /Applications \
            --scripts build/pkg-scripts \
            --identifier com.vibeterminal.app \
            --version "${VERSION}" \
            "dist/VibeTerminal-${VERSION}-arm64.pkg"
          rm -rf pkg-tmp-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            # dist/*.dmg
            dist/*.zip
            dist/*.pkg
            dist/latest-mac.yml
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/latest.yml
          retention-days: 5

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2
      - run: npm run build:linux -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.deb
            dist/latest-linux.yml
          retention-days: 5

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "VibeTerminal $TAG" --latest --notes ""
          find artifacts -type f | while read f; do
            gh release upload "$TAG" "$f" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
